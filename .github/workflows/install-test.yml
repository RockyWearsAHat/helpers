name: Install test

# Proves a Helpers install is fully Node-free on every major OS: on each runner we
# build the native binary (the prebuilt that ships), simulate the install (place
# the binary + symlink the `helpers`/git-* CLIs + register), then verify with NODE
# and the build toolchain hidden — so a green run means the install needs nothing
# external, just the single binary. Runs on PRs touching install/CLI/packaging, on
# pushes to main (install is built+tested on version merge), and weekly.

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "Helpers-Installer.sh"
      - "scripts/fetch-prebuilt.sh"
      - "scripts/verify-install.sh"
      - "native/**"
      - "claude-config/**"
      - "copilot-config/**"
      - ".github/workflows/install-test.yml"
  push:
    branches: [main]
    paths-ignore:
      - "community-cache/**"
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read

concurrency:
  group: install-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-free-install:
    name: node-free install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build the native binary (the prebuilt that ships)
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo build --release --manifest-path native/Cargo.toml

      - name: Simulate a Node-free install, then verify with Node hidden
        run: |
          set -euo pipefail
          EXE=""; [ "${{ runner.os }}" = "Windows" ] && EXE=".exe"
          BIN="$RUNNER_TEMP/helpersbin"
          mkdir -p "$BIN"
          cp "native/target/release/helpers-native$EXE" "$BIN/helpers-native$EXE"
          # Symlink the busybox CLIs to the binary (copy fallback where symlinks
          # need elevation, e.g. Windows).
          cd "$BIN"
          for n in helpers git-resolve git-remerge git-fucked-the-push git-initialize \
                   git-get git-scan-for-leaked-envs git-upload git-checkpoint \
                   git-help-i-pushed-an-env git-cs-grade; do
            ln -sf "helpers-native$EXE" "$n$EXE" 2>/dev/null || cp "helpers-native$EXE" "$n$EXE"
          done
          cd - >/dev/null
          # Register (no `claude` in CI → it prints the manual line and writes the
          # embedded agent config + managed CLAUDE.md block).
          "$BIN/helpers$EXE" install --agent claude || true
          # Now prove it's Node-free.
          bash scripts/verify-install.sh "$BIN/helpers$EXE"

      - name: Lint the Node-free bootstrap scripts
        if: runner.os != 'Windows'
        run: bash -n scripts/fetch-prebuilt.sh && bash -n scripts/verify-install.sh && bash -n Helpers-Installer.sh
