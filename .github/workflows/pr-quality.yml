name: PR Quality

on:
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - "community-cache/**"
      - "knowledge/**"
      - "release-notes/**"

concurrency:
  group: pr-quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shell-lint:
    name: Shell lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          set -euo pipefail

          shell_files=()
          while IFS= read -r -d '' path; do
            if file -b "$path" | grep -Eq 'shell script|bash script'; then
              shell_files+=("$path")
            fi
          done < <(
            find . \
              -not -path './.git/*' \
              -not -path './node_modules/*' \
              -not -path './vscode-extension/node_modules/*' \
              \( -name '*.sh' -o -name 'git-*' \) \
              -not -name '*.md' \
              -not -name '*.json' \
              -print0
          )

          if [ "${#shell_files[@]}" -gt 0 ]; then
            shellcheck --severity=warning --exclude=SC2034,SC2086 "${shell_files[@]}"
          else
            echo "No shell scripts found to lint."
          fi

  node-validate:
    name: Node.js validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate MCP server syntax
        run: node --check helpers-server git-research-mcp

      - name: Validate patch scripts syntax
        run: |
          for f in scripts/patch-vscode-*.js; do
            node --check "$f"
          done

      - name: Validate extension entry point syntax
        run: node --check vscode-extension/extension.js

      - name: Validate extension source files syntax
        run: |
          for f in vscode-extension/src/*.js; do
            node --check "$f"
          done

      - name: Validate lib scripts syntax
        run: |
          for f in lib/*.js; do
            node --check "$f"
          done
