name: Cross-platform tests

on:
  push:
    branches: [main]
    paths-ignore:
      - "community-cache/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "community-cache/**"

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify bash is available
        run: bash --version

      - name: Verify git is available
        run: git --version

      - name: Make scripts executable
        if: runner.os != 'Windows'
        run: |
          chmod +x scripts/test.sh scripts/test-git-upload-states.sh \
            scripts/build-dist.sh \
            scripts/community-cache-submit.sh scripts/community-cache-pull.sh \
            scripts/community-research-submit.sh

      - name: Configure git identity (required by state tests)
        run: |
          git config --global user.name "CI Bot"
          git config --global user.email "ci@example.com"
          git config --global init.defaultBranch main

      - name: Run full test suite
        run: bash scripts/test.sh

      - name: Run state recovery tests (verbose)
        if: runner.os != 'Windows'
        run: bash scripts/test-git-upload-states.sh
